<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Catcher — Deep Space</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #080711;
    --cyan:    #00E5FF;
    --gold:    #FFD740;
    --magenta: #FF4081;
    --cyan-dim:    rgba(0,229,255,0.15);
    --gold-dim:    rgba(255,215,64,0.15);
    --magenta-dim: rgba(255,64,129,0.15);
    --glass-bg:    rgba(12,14,28,0.75);
    --glass-border:rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg-deep);
    font-family: 'Orbitron', 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ---------- OVERLAY SCREENS ---------- */
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  /* -- Character Select -- */
  #menu-screen {
    background: radial-gradient(ellipse at center, rgba(8,7,17,0.7) 0%, rgba(8,7,17,0.95) 100%);
  }

  .menu-title {
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 40px rgba(0,229,255,0.6), 0 0 80px rgba(0,229,255,0.3);
    margin-bottom: 0.6rem;
    text-align: center;
  }
  .menu-subtitle {
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.45);
    margin-bottom: 3rem;
    text-align: center;
  }

  .cards-row {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 3rem;
    padding: 0 1rem;
  }

  .char-card {
    width: 240px;
    background: var(--glass-bg);
    border: 2px solid var(--glass-border);
    border-radius: 20px;
    padding: 2rem 1.5rem 1.5rem;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center;
    position: relative;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .char-card:hover {
    transform: translateY(-8px) scale(1.04);
    border-color: rgba(255,255,255,0.25);
  }
  .char-card.selected {
    transform: translateY(-10px) scale(1.06);
  }
  /* per-character glow */
  .char-card.explorer { --accent: var(--cyan); }
  .char-card.scout    { --accent: var(--gold); }
  .char-card.pilot    { --accent: var(--magenta); }
  .char-card.explorer:hover,
  .char-card.explorer.selected { border-color: var(--cyan); box-shadow: 0 0 40px rgba(0,229,255,0.5), 0 0 80px rgba(0,229,255,0.2); }
  .char-card.scout:hover,
  .char-card.scout.selected    { border-color: var(--gold); box-shadow: 0 0 40px rgba(255,215,64,0.5), 0 0 80px rgba(255,215,64,0.2); }
  .char-card.pilot:hover,
  .char-card.pilot.selected    { border-color: var(--magenta); box-shadow: 0 0 40px rgba(255,64,129,0.5), 0 0 80px rgba(255,64,129,0.2); }

  .char-icon {
    font-size: 3.5rem;
    margin-bottom: 0.8rem;
    filter: drop-shadow(0 0 18px var(--accent));
  }
  .char-name {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #fff;
    margin-bottom: 0.5rem;
  }
  .char-trait {
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }
  .char-trait b {
    color: var(--accent);
    font-weight: 600;
  }

  /* -- Buttons -- */
  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.9rem 2.8rem;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .btn:disabled {
    pointer-events: none;
    opacity: 0.35;
  }
  .btn.active {
    color: #fff;
    animation: btn-pulse-glow 2s ease-in-out infinite;
  }
  .btn.active:hover {
    transform: scale(1.06);
  }
  @keyframes btn-pulse-glow {
    0%, 100% { box-shadow: 0 0 30px var(--glow-color), 0 0 60px var(--glow-color-dim); }
    50%      { box-shadow: 0 0 45px var(--glow-color), 0 0 80px var(--glow-color-dim); }
  }

  .btn.play-again {
    border-color: var(--gold);
    color: #fff;
    background: rgba(255,215,64,0.12);
    box-shadow: 0 0 30px rgba(255,215,64,0.35);
  }
  .btn.play-again:hover {
    background: rgba(255,215,64,0.2);
    box-shadow: 0 0 50px rgba(255,215,64,0.5);
    transform: scale(1.06);
  }

  /* -- Game Over -- */
  #gameover-screen {
    background: radial-gradient(ellipse at center, rgba(8,7,17,0.7) 0%, rgba(8,7,17,0.95) 100%);
  }

  .go-card {
    background: var(--glass-bg);
    border: 2px solid var(--glass-border);
    border-radius: 24px;
    padding: 2.5rem 3rem;
    text-align: center;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    max-width: 480px;
    width: 90%;
  }
  .go-title {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,215,64,0.5);
    margin-bottom: 1.5rem;
  }
  .go-stat {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.4);
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }
  .go-val {
    font-size: 2.5rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 1.2rem;
  }
  .go-rating {
    display: inline-block;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.5rem 1.8rem;
    border-radius: 50px;
    margin-bottom: 1.8rem;
  }
  .go-rating.rookie  { color: #FFD740; border: 2px solid rgba(255,215,64,0.4); background: rgba(255,215,64,0.08); }
  .go-rating.ace     { color: #00E5FF; border: 2px solid rgba(0,229,255,0.5); background: rgba(0,229,255,0.1);  box-shadow: 0 0 20px rgba(0,229,255,0.25); }
  .go-rating.legend  { color: #FF4081; border: 2px solid rgba(255,64,129,0.5); background: rgba(255,64,129,0.1); box-shadow: 0 0 30px rgba(255,64,129,0.35); animation: legend-glow 1.5s ease-in-out infinite; }
  @keyframes legend-glow {
    0%, 100% { box-shadow: 0 0 30px rgba(255,64,129,0.35); }
    50%      { box-shadow: 0 0 55px rgba(255,64,129,0.6); }
  }

  .go-char {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2rem;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- SCREEN 1: Character Selection -->
<div id="menu-screen" class="overlay">
  <h1 class="menu-title">Choose Your Character</h1>
  <p class="menu-subtitle">select a pilot for this mission</p>
  <div class="cards-row">
    <div class="char-card explorer" data-char="explorer" onclick="selectCharacter('explorer')">
      <div class="char-icon">🧲</div>
      <div class="char-name">EXPLORER</div>
      <div class="char-trait"><b>Magnet</b> — 2× wider star collection radius</div>
    </div>
    <div class="char-card scout" data-char="scout" onclick="selectCharacter('scout')">
      <div class="char-icon">⚡</div>
      <div class="char-name">SCOUT</div>
      <div class="char-trait"><b>Agility</b> — 1.6× faster movement speed</div>
    </div>
    <div class="char-card pilot" data-char="pilot" onclick="selectCharacter('pilot')">
      <div class="char-icon">💎</div>
      <div class="char-name">PILOT</div>
      <div class="char-trait"><b>1.5× Multiplier</b> — all scores multiplied by 1.5</div>
    </div>
  </div>
  <button id="start-btn" class="btn" disabled onclick="startGame()">Start Game</button>
</div>

<!-- SCREEN 3: Game Over -->
<div id="gameover-screen" class="overlay hidden">
  <div class="go-card">
    <div class="go-title">MISSION COMPLETE</div>
    <div class="go-stat">Final Score</div>
    <div class="go-val" id="go-score">0</div>
    <div class="go-rating" id="go-rating">ROOKIE</div>
    <div class="go-char" id="go-char"></div>
    <button class="btn play-again" onclick="playAgain()">Play Again</button>
  </div>
</div>

<script>
"use strict";

// ─────────────────────────────────────
// STATE
// ─────────────────────────────────────
const STATE = { MENU: 'menu', PLAYING: 'playing', GAMEOVER: 'gameover' };
let gameState   = STATE.MENU;
let selectedChar = null;

// Character configs
const CHARS = {
  explorer: { name: 'Explorer', accent: '#00E5FF', color: 'cyan', radiusMult: 2.0, speedMult: 1.0, scoreMult: 1.0, icon: '🧲' },
  scout:    { name: 'Scout',    accent: '#FFD740', color: 'gold',  radiusMult: 1.0, speedMult: 1.6, scoreMult: 1.0, icon: '⚡' },
  pilot:    { name: 'Pilot',    accent: '#FF4081', color: 'magenta',radiusMult: 1.0, speedMult: 1.0, scoreMult: 1.5, icon: '💎' },
};

// ─────────────────────────────────────
// AUDIO (Web Audio API)
// ─────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type='square', vol=0.08, glideTo=null) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

function sfxSelect() {
  playTone(660, 0.12, 'square', 0.06);
  setTimeout(() => playTone(880, 0.15, 'square', 0.06), 80);
}

function sfxCollect() {
  playTone(1200, 0.08, 'square', 0.05);
  setTimeout(() => playTone(1600, 0.1, 'square', 0.04), 40);
}

function sfxGameOver() {
  playTone(440, 0.3, 'sawtooth', 0.07, 220);
  setTimeout(() => playTone(330, 0.4, 'sawtooth', 0.06, 150), 250);
  setTimeout(() => playTone(220, 0.5, 'triangle', 0.05, 80), 550);
}

// ─────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

// ─────────────────────────────────────
// BACKGROUND STARFIELD (always running)
// ─────────────────────────────────────
const starLayers = [];
const LAYER_COUNT = 4;
const STARS_PER_LAYER = [60, 50, 40, 25];
const LAYER_SPEEDS  = [0.15, 0.3, 0.55, 0.9];
const LAYER_SIZES   = [0.8, 1.2, 1.6, 2.2];
const LAYER_ALPHAS  = [0.3, 0.45, 0.6, 0.85];

for (let l = 0; l < LAYER_COUNT; l++) {
  const stars = [];
  for (let i = 0; i < STARS_PER_LAYER[l]; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * LAYER_SIZES[l] + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.04 + 0.01,
    });
  }
  starLayers.push({ stars, speed: LAYER_SPEEDS[l], alpha: LAYER_ALPHAS[l] });
}

// ─────────────────────────────────────
// GAMEPLAY OBJECTS
// ─────────────────────────────────────
const BASE_SPEED = 280; // px/sec
const BASE_RADIUS = 24;
const STAR_COUNT = 10;
const GAME_DURATION = 30; // seconds
const COMBO_WINDOW = 1.5; // seconds to keep combo alive

let player = null;
let collectibles = [];
let particles = [];
let score = 0;
let combo = 0;
let comboTimer = 0;
let gameTimer = GAME_DURATION;
let lastTime = 0;

function resetGameplay() {
  const c = CHARS[selectedChar];
  player = {
    x: W / 2,
    y: H / 2,
    r: BASE_RADIUS,
    collectRadius: BASE_RADIUS * c.radiusMult,
    speed: BASE_SPEED * c.speedMult,
    accent: c.accent,
  };
  collectibles = [];
  particles = [];
  score = 0;
  combo = 0;
  comboTimer = 0;
  gameTimer = GAME_DURATION;
  spawnStars();
}

function spawnStars() {
  collectibles = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    spawnOneStar();
  }
}

function spawnOneStar() {
  const margin = 60;
  collectibles.push({
    x: margin + Math.random() * (W - margin * 2),
    y: margin + Math.random() * (H - margin * 2),
    r: 10 + Math.random() * 6,
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: 0.04 + Math.random() * 0.06,
  });
}

function burstParticles(x, y, accent) {
  const count = 18 + Math.floor(Math.random() * 10);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 250;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.4 + Math.random() * 0.5,
      maxLife: 0.4 + Math.random() * 0.5,
      r: 1.5 + Math.random() * 3.5,
      accent,
    });
  }
}

// ─────────────────────────────────────
// INPUT
// ─────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// ─────────────────────────────────────
// UI LOGIC
// ─────────────────────────────────────
function selectCharacter(name) {
  if (gameState !== STATE.MENU) return;
  selectedChar = name;
  sfxSelect();

  // Update card visuals
  document.querySelectorAll('.char-card').forEach(card => {
    card.classList.toggle('selected', card.dataset.char === name);
  });

  // Activate start button with character accent color
  const btn = document.getElementById('start-btn');
  btn.disabled = false;
  btn.classList.add('active');
  const accent = CHARS[name].accent;
  btn.style.setProperty('--glow-color', accent);
  btn.style.setProperty('--glow-color-dim', accent.replace(')', ',0.25)').replace('rgb', 'rgba'));
  btn.style.borderColor = accent;
  btn.style.background = accent.replace(')', ',0.15)').replace('rgb', 'rgba');
}

function startGame() {
  if (!selectedChar) return;
  ensureAudio();
  gameState = STATE.PLAYING;
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  resetGameplay();
  lastTime = performance.now();
}

function endGame() {
  gameState = STATE.GAMEOVER;
  sfxGameOver();

  const c = CHARS[selectedChar];
  const finalScore = Math.floor(score);
  let rating, ratingClass;
  if (finalScore >= 800)      { rating = 'LEGEND'; ratingClass = 'legend'; }
  else if (finalScore >= 300) { rating = 'ACE';    ratingClass = 'ace'; }
  else                        { rating = 'ROOKIE'; ratingClass = 'rookie'; }

  document.getElementById('go-score').textContent = finalScore;
  document.getElementById('go-rating').textContent = rating;
  document.getElementById('go-rating').className = 'go-rating ' + ratingClass;
  document.getElementById('go-char').innerHTML = `Played as <b style="color:${c.accent}">${c.icon} ${c.name}</b>`;
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function playAgain() {
  gameState = STATE.MENU;
  selectedChar = null;
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.classList.remove('active');
  btn.style.removeProperty('--glow-color');
  btn.style.removeProperty('--glow-color-dim');
  btn.style.borderColor = '';
  btn.style.background = '';
}

// ─────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────
function update(dt) {
  if (gameState !== STATE.PLAYING) return;

  // Clamp dt
  dt = Math.min(dt, 0.1);

  // Timer
  gameTimer -= dt;
  if (gameTimer <= 0) {
    gameTimer = 0;
    endGame();
    return;
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { combo = 0; comboTimer = 0; }
  }

  // Movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup'])    dy -= 1;
  if (keys['s'] || keys['arrowdown'])  dy += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  // Normalize diagonal
  const mag = Math.sqrt(dx * dx + dy * dy);
  if (mag > 1) { dx /= mag; dy /= mag; }

  player.x += dx * player.speed * dt;
  player.y += dy * player.speed * dt;

  // Boundary clamp
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));

  // Star collection
  const c = CHARS[selectedChar];
  for (let i = collectibles.length - 1; i >= 0; i--) {
    const s = collectibles[i];
    const dist = Math.hypot(player.x - s.x, player.y - s.y);
    if (dist < player.collectRadius + s.r) {
      // Score with multiplier
      combo++;
      comboTimer = COMBO_WINDOW;
      const comboMult = 1 + (combo - 1) * 0.25;
      const basePoints = 10;
      const points = basePoints * comboMult * c.scoreMult;
      score += points;

      // Particles
      burstParticles(s.x, s.y, c.accent);
      sfxCollect();

      // Respawn
      collectibles.splice(i, 1);
      spawnOneStar();
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawStarfield() {
  for (const layer of starLayers) {
    for (const s of layer.stars) {
      s.twinkle += s.twinkleSpeed;
      const alpha = layer.alpha * (0.6 + 0.4 * Math.sin(s.twinkle));
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawHUD() {
  const c = CHARS[selectedChar];
  const comboMult = 1 + (combo > 0 ? (combo - 1) * 0.25 : 0);
  const effMult = comboMult * c.scoreMult;
  const timerSec = Math.ceil(gameTimer);
  const timerColor = timerSec <= 5 ? '#FF4081' : timerSec <= 10 ? '#FFD740' : '#fff';

  ctx.save();

  // HUD background bar
  const barH = 56;
  ctx.fillStyle = 'rgba(8,7,17,0.7)';
  ctx.fillRect(0, 0, W, barH);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, barH);
  ctx.lineTo(W, barH);
  ctx.stroke();

  // Score (left)
  ctx.fillStyle = '#fff';
  ctx.font = '600 11px Orbitron';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE', 24, 18);
  ctx.font = '800 22px Orbitron';
  ctx.shadowColor = c.accent;
  ctx.shadowBlur = 12;
  ctx.fillText(Math.floor(score).toString(), 24, 42);
  ctx.shadowBlur = 0;

  // Multiplier (center)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '600 10px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillText('MULTIPLIER', W / 2, 18);
  ctx.fillStyle = c.accent;
  ctx.font = '800 18px Orbitron';
  ctx.shadowColor = c.accent;
  ctx.shadowBlur = 10;
  ctx.fillText(`×${effMult.toFixed(1)}`, W / 2, 42);
  ctx.shadowBlur = 0;

  // Combo
  if (combo > 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '600 9px Orbitron';
    ctx.fillText(`COMBO ${combo}`, W / 2, 54);
  }

  // Timer (right)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '600 10px Orbitron';
  ctx.textAlign = 'right';
  ctx.fillText('TIME', W - 24, 18);
  ctx.fillStyle = timerColor;
  ctx.font = '800 22px Orbitron';
  ctx.shadowColor = timerColor;
  ctx.shadowBlur = timerSec <= 5 ? 15 : 8;
  ctx.fillText(timerSec + 's', W - 24, 42);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawPlayer() {
  const { x, y, r, accent } = player;
  ctx.save();
  ctx.translate(x, y);

  // Outer glow
  ctx.shadowColor = accent;
  ctx.shadowBlur = 20;

  // Collection radius indicator
  ctx.strokeStyle = accent.replace(')', ',0.2)').replace('rgb','rgba');
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 10]);
  ctx.beginPath();
  ctx.arc(0, 0, player.collectRadius, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Ship body — hexagon / diamond shape
  ctx.fillStyle = accent;
  ctx.beginPath();
  // Draw a sharp hexagon pointing right
  const pts = [
    [r * 0.9, 0],              // nose right
    [r * 0.3, r * 0.6],        // bottom front
    [-r * 0.5, r * 0.45],      // bottom back
    [-r * 0.7, 0],             // tail center
    [-r * 0.5, -r * 0.45],     // top back
    [r * 0.3, -r * 0.6],       // top front
  ];
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fill();

  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.arc(-r * 0.05, -r * 0.1, r * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawCollectibles() {
  for (const s of collectibles) {
    s.pulse += s.pulseSpeed;
    const scale = 1 + 0.2 * Math.sin(s.pulse);
    const r = s.r * scale;

    ctx.save();
    ctx.translate(s.x, s.y);

    // Outer glow
    ctx.shadowColor = '#FFD740';
    ctx.shadowBlur = 18;

    // Star shape
    ctx.fillStyle = '#FFD740';
    ctx.beginPath();
    const spikes = 5;
    const outerR = r;
    const innerR = r * 0.4;
    for (let i = 0; i < spikes * 2; i++) {
      const radius = i % 2 === 0 ? outerR : innerR;
      const angle = (i * Math.PI) / spikes - Math.PI / 2;
      const sx = Math.cos(angle) * radius;
      const sy = Math.sin(angle) * radius;
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.fill();

    // Bright core
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.25, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.accent.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawStarfield();

  if (gameState === STATE.PLAYING) {
    drawCollectibles();
    drawParticles();
    drawPlayer();
    drawHUD();
  }
}

// ─────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────
function gameLoop(now) {
  requestAnimationFrame(gameLoop);

  // Update starfield layers (parallax)
  for (const layer of starLayers) {
    for (const s of layer.stars) {
      s.y += layer.speed;
      if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
    }
  }

  if (lastTime > 0) {
    const dt = (now - lastTime) / 1000;
    update(dt);
  }
  lastTime = now;

  render();
}

// ─────────────────────────────────────
// STARTUP
// ─────────────────────────────────────
resize();
// Re-init star positions after resize
for (const layer of starLayers) {
  for (const s of layer.stars) {
    s.x = Math.random() * W;
    s.y = Math.random() * H;
  }
}
requestAnimationFrame(gameLoop);

console.log('%c🚀 Star Catcher %cready',
  'color:#00E5FF;font-size:18px;font-weight:bold',
  'color:#fff');
console.log('%cChoose a character and catch those stars!',
  'color:rgba(255,255,255,0.6)');
</script>
