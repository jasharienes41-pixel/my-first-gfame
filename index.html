<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Catcher</title>
  <style>
    :root {
      --bg-dark: #080711;
      --accent-cyan: #00f0ff;
      --accent-gold: #ffd700;
      --accent-magenta: #ff007f;
      --text-light: #f0f4f8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Animated background canvas */
    #bg-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Container Glassmorphism Card */
    .game-card {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 700px;
      background: rgba(15, 14, 33, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }

    h1.title {
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 25px;
      background: linear-gradient(135deg, #fff, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    /* Character Selection Screen */
    .character-container {
      display: flex;
      justify-content: space-around;
      gap: 15px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .char-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      padding: 15px;
      border-radius: 16px;
      border: 2px solid transparent;
      width: 140px;
    }

    .char-card:hover {
      transform: translateY(-8px);
    }

    .char-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 12px;
      position: relative;
      transition: box-shadow 0.3s ease;
    }

    /* Character specific colors & glows */
    .explorer .char-circle {
      background: radial-gradient(circle at 30% 30%, #a2f9ff, var(--accent-cyan));
      box-shadow: 0 0 15px var(--accent-cyan);
    }
    .scout .char-circle {
      background: radial-gradient(circle at 30% 30%, #fff3a3, var(--accent-gold));
      box-shadow: 0 0 15px var(--accent-gold);
    }
    .pilot .char-circle {
      background: radial-gradient(circle at 30% 30%, #ff94cb, var(--accent-magenta));
      box-shadow: 0 0 15px var(--accent-magenta);
    }

    .char-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .char-desc {
      font-size: 0.75rem;
      color: #a0aab5;
      margin-top: 5px;
    }

    /* Selected state */
    .char-card.selected {
      background: rgba(255, 255, 255, 0.05);
      transform: scale(1.08);
    }
    .char-card.explorer.selected { border-color: var(--accent-cyan); }
    .char-card.scout.selected { border-color: var(--accent-gold); }
    .char-card.pilot.selected { border-color: var(--accent-magenta); }

    /* Button */
    .btn {
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #2a2d3d;
      color: #6c757d;
      box-shadow: none;
    }

    .btn.active {
      background: linear-gradient(135deg, var(--accent-cyan), #0077ff);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
    }

    .btn.active:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.8);
    }

    /* Gameplay HUD & Canvas */
    #game-container {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 10px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    #game-canvas {
      width: 100%;
      height: 400px;
      background: rgba(5, 5, 15, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Game Over Overlay */
    #game-over {
      display: none;
      flex-direction: column;
      gap: 15px;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="game-card">
    <!-- Screen 1: Selection -->
    <div id="selection-screen">
      <h1 class="title">Choose Your Character</h1>

      <div class="character-container">
        <div class="char-card explorer" onclick="selectCharacter('explorer')">
          <div class="char-circle"></div>
          <div class="char-name">Explorer</div>
          <div class="char-desc">Large Magnet Radius</div>
        </div>

        <div class="char-card scout" onclick="selectCharacter('scout')">
          <div class="char-circle"></div>
          <div class="char-name">Scout</div>
          <div class="char-desc">Super Fast Speed</div>
        </div>

        <div class="char-card pilot" onclick="selectCharacter('pilot')">
          <div class="char-circle"></div>
          <div class="char-name">Pilot</div>
          <div class="char-desc">Bonus Score Multiplier</div>
        </div>
      </div>

      <button id="start-btn" class="btn" disabled onclick="startGame()">Start Game</button>
    </div>

    <!-- Screen 2: Gameplay -->
    <div id="game-container">
      <div class="hud">
        <div>Score: <span id="score-val" style="color: var(--accent-gold);">0</span></div>
        <div>Time: <span id="time-val" style="color: var(--accent-cyan);">30</span>s</div>
      </div>
      <canvas id="game-canvas"></canvas>
    </div>

    <!-- Screen 3: Game Over -->
    <div id="game-over">
      <h1 class="title">Mission Complete!</h1>
      <p style="font-size: 1.3rem;">Total Stars Collected: <strong id="final-score" style="color: var(--accent-gold);">0</strong></p>
      <button class="btn active" onclick="resetToSelect()" style="margin-top: 15px;">Play Again</button>
    </div>
  </div>

  <script>
    // --- Audio Synthesis (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    // --- Background Stars Effect ---
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgStars = [];

    function initBg() {
      bgCanvas.width = window.innerWidth;
      bgCanvas.height = window.innerHeight;
      bgStars = Array.from({ length: 120 }, () => ({
        x: Math.random() * bgCanvas.width,
        y: Math.random() * bgCanvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.5 + 0.1
      }));
    }

    function renderBg() {
      bgCtx.fillStyle = '#080711';
      bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
      bgCtx.fillStyle = '#ffffff';
      bgStars.forEach(star => {
        bgCtx.beginPath();
        bgCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        bgCtx.fill();
        star.y += star.speed;
        if (star.y > bgCanvas.height) star.y = 0;
      });
      requestAnimationFrame(renderBg);
    }
    window.addEventListener('resize', initBg);
    initBg();
    renderBg();

    // --- Character & Game Config ---
    const CHAR_STATS = {
      explorer: { color: '#00f0ff', speed: 6, radius: 25, magnetRadius: 90, scoreMult: 1 },
      scout:    { color: '#ffd700', speed: 9, radius: 18, magnetRadius: 40, scoreMult: 1 },
      pilot:    { color: '#ff007f', speed: 7, radius: 22, magnetRadius: 50, scoreMult: 1.5 }
    };

    let selectedCharKey = null;
    let gameLoopId = null;
    let timerInterval = null;

    // --- Selection UI Logic ---
    function selectCharacter(key) {
      selectedCharKey = key;
      document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected'));
      document.querySelector(`.char-card.${key}`).classList.add('selected');

      const btn = document.getElementById('start-btn');
      btn.disabled = false;
      btn.classList.add('active');
      playSound(440, 'sine', 0.1);
    }

    // --- Gameplay Logic ---
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let player, stars, particles, score, timeLeft, keys;

    function startGame() {
      document.getElementById('selection-screen').style.display = 'none';
      document.getElementById('game-container').style.display = 'flex';

      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      const stats = CHAR_STATS[selectedCharKey];
      player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        ...stats
      };

      stars = [];
      particles = [];
      score = 0;
      timeLeft = 30;
      keys = {};

      document.getElementById('score-val').innerText = '0';
      document.getElementById('time-val').innerText = timeLeft;

      // Named handlers so we can clean them up later
      window._scKeyDown = e => keys[e.key] = true;
      window._scKeyUp   = e => keys[e.key] = false;
      window.addEventListener('keydown', window._scKeyDown);
      window.addEventListener('keyup', window._scKeyUp);

      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('time-val').innerText = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);

      gameLoop();
    }

    function spawnStar() {
      if (stars.length < 7) {
        stars.push({
          x: Math.random() * (canvas.width - 40) + 20,
          y: Math.random() * (canvas.height - 40) + 20,
          radius: 8,
          pulse: 0
        });
      }
    }

    function createParticles(x, y, color) {
      for (let i = 0; i < 12; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 1,
          color
        });
      }
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Handle Inputs
      if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y = Math.max(player.radius, player.y - player.speed);
      if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y = Math.min(canvas.height - player.radius, player.y + player.speed);
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x = Math.max(player.radius, player.x - player.speed);
      if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x = Math.min(canvas.width - player.radius, player.x + player.speed);

      // Render Player Magnet Ring
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.magnetRadius, 0, Math.PI * 2);
      ctx.strokeStyle = player.color + '33';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Render Player
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
      ctx.fillStyle = player.color;
      ctx.shadowColor = player.color;
      ctx.shadowBlur = 15;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Spawn Stars randomly
      if (Math.random() < 0.05) spawnStar();

      // Process Stars
      stars.forEach((star, index) => {
        // Magnet attraction
        const dx = player.x - star.x;
        const dy = player.y - star.y;
        const dist = Math.hypot(dx, dy);

        if (dist < player.magnetRadius) {
          star.x += (dx / dist) * 4;
          star.y += (dy / dist) * 4;
        }

        // Collection Check
        if (dist < player.radius + star.radius) {
          createParticles(star.x, star.y, '#ffd700');
          playSound(600 + Math.random() * 200, 'triangle', 0.15);
          score += Math.round(10 * player.scoreMult);
          document.getElementById('score-val').innerText = score;
          stars.splice(index, 1);
        }

        // Draw Star
        star.pulse += 0.05;
        const currentRadius = star.radius + Math.sin(star.pulse) * 2;
        ctx.beginPath();
        ctx.arc(star.x, star.y, currentRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#ffd700';
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      });

      // Process Particles
      particles.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.04;
        if (p.life <= 0) {
          particles.splice(index, 1);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      });

      gameLoopId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      cancelAnimationFrame(gameLoopId);
      clearInterval(timerInterval);
      if (window._scKeyDown) window.removeEventListener('keydown', window._scKeyDown);
      if (window._scKeyUp)   window.removeEventListener('keyup', window._scKeyUp);
      window._scKeyDown = window._scKeyUp = null;
      playSound(200, 'sawtooth', 0.4);

      document.getElementById('game-container').style.display = 'none';
      document.getElementById('game-over').style.display = 'flex';
      document.getElementById('final-score').innerText = score;
    }

    function resetToSelect() {
      document.getElementById('game-over').style.display = 'none';
      document.getElementById('selection-screen').style.display = 'block';
      // Reset selection state
      selectedCharKey = null;
      document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected'));
      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.classList.remove('active');
    }
  </script>
</body>
</html>
